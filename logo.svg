<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" width="220" height="56">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600&amp;family=DM+Serif+Display&amp;display=swap');
    </style>
  </defs>

  <!-- Logo Mark Box -->
  <rect x="0" y="0" width="56" height="56" rx="10" fill="#243558" stroke="rgba(147,197,253,0.2)" stroke-width="1.2"/>

  <!-- PDF text -->
  <text x="28" y="20" font-family="Outfit, sans-serif" font-weight="600" font-size="11" letter-spacing="1.2" fill="#FFFFFF" text-anchor="middle">PDF</text>

  <!-- Green divider line -->
  <rect x="9" y="26" width="38" height="2" rx="1" fill="#16A34A"/>

  <!-- SIGN text -->
  <text x="28" y="43" font-family="Outfit, sans-serif" font-weight="600" font-size="11" letter-spacing="1.2" fill="#93C5FD" text-anchor="middle">SIGN</text>

  <!-- Logo Name: PDF -->
  <text x="72" y="38" font-family="DM Serif Display, serif" font-size="28" fill="#1B2A47" letter-spacing="-0.3">PDF</text>

  <!-- Logo Name: Sign (green) -->
  <text x="122" y="38" font-family="DM Serif Display, serif" font-size="28" fill="#22C55E" letter-spacing="-0.3">Sign</text>

  <!-- Logo Name: .in -->
  <text x="169" y="38" font-family="DM Serif Display, serif" font-size="28" fill="#1B2A47" letter-spacing="-0.3">.in</text>
</svg>
